name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'refactor/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  test:
    name: test (windows, py3.13)
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: '3.13'

      - name: Sync dependencies (frozen, lockと不整合ならCI失敗)
        run: uv sync --frozen --group dev

      - name: Compile check (src / tools)
        run: uv run --no-sync python -m compileall -q src tools

      - name: Run tests
        run: uv run --no-sync pytest -q
