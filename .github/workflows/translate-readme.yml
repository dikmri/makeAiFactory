name: Translate README

on:
  push:
    branches: [main]
    paths:
      - 'README.md'

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip readme-translate]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install deep-translator
        run: pip install deep-translator

      - name: Translate README
        run: python tools/translate_readme.py

      - name: Commit translated READMEs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md README.en.md README.zh.md README.ko.md
          git diff --cached --quiet || git commit -m "docs: README多言語版を自動更新 [skip readme-translate]"
          git push
